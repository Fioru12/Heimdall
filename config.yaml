# Heimdall HIDS & Active Response Configuration

server:
  host: "127.0.0.1"
  port: 8000
  reload: true

database:
  path: "heimdall.db"

rules:
  directory: "rules"

responder:
  dry_run: true
  allowed_os: ["Linux", "Windows"]

# Telegram notifications (optional)
# To enable:
# 1. Create a bot via @BotFather on Telegram
# 2. Get your chat ID via @userinfobot
# 3. Fill in the values below
telegram:
  enabled: false
  bot_token: ""
  chat_id: ""
